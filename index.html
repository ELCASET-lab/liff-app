<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>5日会集金アプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        h1 { color: #333; font-size: 20px; border-bottom: 2px solid #06C755; padding-bottom: 10px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #loading { text-align: center; margin-top: 50px; font-weight: bold; }
        #admin-view, #user-view { display: none; }
        .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; color: white; margin-bottom: 10px; }
        .role-admin { background-color: #f44336; }
        .role-user { background-color: #06C755; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        
        button { background-color: #06C755; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; font-weight: bold; }
        button:active { opacity: 0.8; }
        .btn-sub { background-color: #777; margin-top: 20px; font-size: 14px; padding: 8px; }
    </style>
</head>
<body>

    <div id="loading">読み込み中...</div>

    <div id="user-view" class="container">
        <div class="role-badge role-user">メンバー</div>
        <h1>こんにちは、<span class="user-name"></span> さん</h1>
        <p>あなたの次回の支払額は...</p>
        <div id="unpaid-amount" style="font-size: 36px; font-weight: bold; color: #f44336; text-align: center; margin: 20px 0;">0 円</div>
        <button onclick="liff.closeWindow()">閉じる</button>
    </div>

    <div id="admin-view" class="container">
        <div class="role-badge role-admin">会計 (管理者)</div>
        <h1>こんにちは、<span class="user-name"></span> さん</h1>
        
        <div style="background: #fdfdfd; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; margin-top: 15px;">
            <h3 style="margin-top: 0; color: #333;">🍻 新しい飲み会の登録</h3>
            
            <div class="form-group">
                <label>イベント名</label>
                <input type="text" id="event-name" placeholder="例：6月度 飲み会">
            </div>
            <div class="form-group">
                <label>開催日</label>
                <input type="date" id="event-date">
            </div>
            <div class="form-group">
                <label>会費 (円)</label>
                <input type="number" id="event-amount" placeholder="例：4000">
            </div>
            
            <button onclick="submitNewEvent()">この内容で集金を開始する</button>
        </div>

        <button class="btn-sub" onclick="switchToUserView()">メンバー画面として表示</button>
    </div>

    <script>
        const MY_LIFF_ID = "2010432252-75FYrhvD"; 
        // ⚠️【超重要】あなたのGASの「ウェブアプリURL」をここに貼り付け直してください
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxFs7FRgENnnx8YlFVjFrX57hpGlOYO4L1acSHX0upyrKRT_Nr7EYO-8UJB1pzcuzwH/exec"; 

        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    liff.getProfile().then(profile => {
                        fetch(GAS_WEB_APP_URL, {
                            method: "POST",
                            body: JSON.stringify({
                                action: 'login',
                                userId: profile.userId,
                                displayName: profile.displayName
                            })
                        })
                        .then(res => res.json())
                        .then(response => {
                            if(response.success) {
                                onLoginSuccess(response.data);
                            } else {
                                alert("GAS処理エラー: " + response.error);
                            }
                        })
                        .catch(err => {
                            alert("通信エラー: " + err);
                        });
                    });
                }
            })
            .catch((err) => {
                document.body.innerHTML = "初期化エラー: " + err;
            });

        // ログイン成功時
        function onLoginSuccess(userInfo) {
            document.getElementById('loading').style.display = 'none';
            const nameElements = document.getElementsByClassName('user-name');
            for(let i=0; i<nameElements.length; i++) {
                nameElements[i].innerText = userInfo.name;
            }

            // ★新機能：送られてきた未払金額を画面に綺麗に表示（3桁カンマ区切り）
            document.getElementById('unpaid-amount').innerText = Number(userInfo.totalAmount).toLocaleString() + " 円";

            if (userInfo.role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
            } else {
                document.getElementById('user-view').style.display = 'block';
            }
        }

        function submitNewEvent() {
            const name = document.getElementById('event-name').value;
            const date = document.getElementById('event-date').value;
            const amount = document.getElementById('event-amount').value;

            if (!name || !date || !amount) {
                alert("すべての項目を入力してください！");
                return;
            }

            if (confirm(`「${name}」を登録し、メンバー全員の集金データを作成します。よろしいですか？`)) {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = "スプレッドシートに書き込み中...";
                document.getElementById('admin-view').style.display = 'none';

                fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: 'createEvent',
                        eventName: name,
                        eventDate: date,
                        amount: amount
                    })
                })
                .then(res => res.json())
                .then(response => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('admin-view').style.display = 'block';
                    
                    if(response.success) {
                        alert(`登録完了！\nメンバーの未払データを作成しました！\n一度アプリを閉じて開き直すと、金額が反映されます。`);
                        document.getElementById('event-name').value = "";
                        document.getElementById('event-date').value = "";
                        document.getElementById('event-amount').value = "";
                    } else {
                        alert("登録エラー: " + response.error);
                    }
                })
                .catch(err => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('admin-view').style.display = 'block';
                    alert("通信エラー: " + err);
                });
            }
        }
        
        function switchToUserView() {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';
        }
    </script>
</body>
</html>
